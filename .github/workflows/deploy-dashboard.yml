name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-dashboard.yml
      - output/energy-analysis/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p public
          cp output/energy-analysis/dashboard.html public/index.html
          cp output/energy-analysis/dashboard_data.js public/dashboard_data.js
          cp output/energy-analysis/*.csv public/
          cp output/energy-analysis/*.json public/
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
